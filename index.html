                            rate: clamp(leadRate - (isDuetModeRef.current ? 0.1 : 0.06), 0.55, 1.2),
                            volume: clamp((isDuetModeRef.current ? leadVolume - 0.2 : leadVolume - 0.14), 0.12, 1),
                            delay: leadDelay + Math.round(beatMs * (isDuetModeRef.current ? 0.2 : 0.12))
                        });
                    }

                    if (vocalPreset.echo && index >= phrase.length - 2) {
                        scheduleUtterance(renderedSyllable, {
                            pitch: clamp(leadPitch + 0.08, 0.6, 2),
                            rate: clamp(leadRate - 0.1, 0.55, 1.2),
                            volume: clamp(0.24 * vocalGainRef.current, 0.08, 0.5),
                            delay: leadDelay + Math.round(beatMs * 0.42)
                        });
                    }
                });

                if (sectionName === 'Chorus' || sectionName === 'Lift') {
                    const adlib = vocalPreset.adlibs[arrangementBar % vocalPreset.adlibs.length];
                    scheduleUtterance(adlib, {
                        pitch: clamp(basePitch + vocalPreset.pitchBoost + 0.25, 0.6, 2),
                        rate: clamp(baseRate + vocalPreset.rateBoost - 0.08, 0.55, 1.2),
                        volume: clamp((vocalPreset.volume + 0.12) * vocalGainRef.current, 0.16, 1),
                        delay: Math.round(phrase.length * beatMs * 0.66)
                    });
                }

                addLog(`VOCALS: ${sectionName.toUpperCase()} ${vocalStyleRef.current.toUpperCase()}${isDuetModeRef.current ? ' DUET' : ''} phrase queued on ${chord.root}.`);
            }, [addLog, clearVocalQueue, getPreferredSingingVoice, tempo]);

            const getAutoTempoForMood = (moodName) => {
                const mood = MOODS[moodName] || MOODS.SynthPop;
                const [minTempo, maxTempo] = mood.autoTempoRange;
                return Math.floor(Math.random() * (maxTempo - minTempo + 1)) + minTempo;
            };

            const chooseRecorderMimeType = () => {
                if (!window.MediaRecorder) return '';
                const options = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
                return options.find((type) => !MediaRecorder.isTypeSupported || MediaRecorder.isTypeSupported(type)) || '';
            };

            const createRecordingFileName = (moodName, mimeType) => {
                const extension = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'm4a' : 'webm';
                const stamp = new Date().toISOString().replace(/[:.]/g, '-');
                return `KAI_${moodName.toUpperCase()}_${stamp}.${extension}`;
            };

            const getLeadEvent = (moodName, mood, chord, currentScale, stepInBar, barIndex, phraseState, sectionName, phraseBar, isFillBar) => {
                const chordLeadTones = chord.chord.map((note) => withOctave(note, 5));
                const lowerChordTones = chord.chord.map((note) => withOctave(note, 4));
                const scaleAt = (index, octave = pickRandom(mood.octaves)) => withOctave(currentScale[index % currentScale.length], octave);
                const sectionProfile = SECTION_PROFILES[sectionName] || SECTION_PROFILES.Verse;

                switch (moodName) {
                    case 'SynthPop': {
                        const triggerSteps = sectionName === 'Intro' ? [5, 7, 13, 15] : sectionName === 'Lift' ? [1, 3, 5, 7, 9, 11, 12, 13, 15] : [1, 3, 5, 7, 9, 11, 13, 15];
                        if (!triggerSteps.includes(stepInBar)) return null;
                        const motif = phraseBar === 3 && isFillBar
                            ? phraseState.fillContour.map((index) => scaleAt(index, 5))
                            : phraseState.leadContour.map((index, idx) => idx % 2 === 0 ? chordLeadTones[index % chordLeadTones.length] : scaleAt(index, 5));
                        return { note: motif[Math.floor(stepInBar / 2) % motif.length], duration: stepInBar === 15 ? '16n' : '8n', velocity: 0.42 + 0.08 * sectionProfile.leadActivity };
                    }
                    case 'Ambient': {
                        if (![0, 8].includes(stepInBar) && Math.random() > 0.04 * sectionProfile.leadActivity) return null;
                        const note = stepInBar === 0 ? chordLeadTones[phraseState.turnaroundTone % chordLeadTones.length] : pickRandom([chordLeadTones[2], chordLeadTones[3], scaleAt(phraseState.responseContour[phraseBar % phraseState.responseContour.length], 6)]);
                        return { note, duration: stepInBar === 0 ? '1m' : '2n', velocity: 0.16 + 0.08 * sectionProfile.leadActivity };
                    }
                    case 'CyberPunk': {
                        const triggerSteps = sectionName === 'Intro' ? [6, 14] : [2, 6, 10, 14];
                        if (!triggerSteps.includes(stepInBar)) return null;
                        const motif = phraseState.responseContour.map((index, idx) => idx % 2 === 0 ? lowerChordTones[index % lowerChordTones.length] : scaleAt(index, 4));
                        return { note: motif[Math.floor(stepInBar / 4) % motif.length], duration: sectionName === 'Lift' ? '16n' : '8n', velocity: 0.28 + 0.1 * sectionProfile.leadActivity };
                    }
                    case 'LoFi': {
                        const triggerSteps = sectionName === 'Lift' ? [3, 6, 7, 11, 14, 15] : [3, 7, 11, 15];
                        if (!triggerSteps.includes(stepInBar)) return null;
                        const notes = phraseState.leadContour.slice(0, 4).map((index, idx) => idx < 2 ? scaleAt(index, 4) : chordLeadTones[index % chordLeadTones.length]);
                        return { note: notes[Math.floor(stepInBar / 4) % notes.length], duration: '8n', velocity: 0.24 + 0.08 * sectionProfile.leadActivity };
                    }
                    case 'Glitch': {
                        if (Math.random() > 0.45 + (1 - sectionProfile.leadActivity) * 0.35) return null;
                        const fillPool = isFillBar ? phraseState.fillContour : phraseState.leadContour;
                        const note = Math.random() > 0.45 ? scaleAt(fillPool[Math.floor(Math.random() * fillPool.length)], pickRandom([3, 4, 5, 6])) : pickRandom(chordLeadTones);
                        return { note, duration: pickRandom(isFillBar ? ['64n', '32n', '16n'] : ['32n', '16n', '8n']), velocity: 0.2 + Math.random() * 0.28 };
                    }
                    case 'VoidCore': {
                        if (sectionName === 'Intro' && ![0, 4, 8, 12].includes(stepInBar)) return null;
                        if (sectionName !== 'Intro' && ![0, 2, 4, 6, 8, 10, 12, 14].includes(stepInBar)) return null;
                        const motif = phraseState.leadContour.map((index, idx) => idx % 2 === 0 ? lowerChordTones[index % lowerChordTones.length] : chordLeadTones[index % chordLeadTones.length]);
                        return { note: motif[Math.floor(stepInBar / 2) % motif.length], duration: sectionName === 'Lift' ? '16n' : '8n', velocity: 0.34 + 0.12 * sectionProfile.leadActivity };
                    }
                    default: {
                        if (Math.random() >= mood.density) return null;
                        return { note: scaleAt(Math.floor(Math.random() * currentScale.length)), duration: '8n', velocity: 0.5 };
                    }
                }
            };

            const getAccentEvent = (moodName, mood, chord, currentScale, stepInBar, barIndex, phraseState, sectionName, isFillBar) => {
                const chordTones = chord.chord;
                const leadHigh = chordTones.map((note) => withOctave(note, 5));
                const scaleAt = (index, octave = 5) => withOctave(currentScale[index % currentScale.length], octave);
                const sectionProfile = SECTION_PROFILES[sectionName] || SECTION_PROFILES.Verse;

                if (sectionProfile.accentActivity < 0.4 && stepInBar !== 8) return null;

                switch (moodName) {
                    case 'SynthPop':
                        if (!phraseState.accentMask.includes(stepInBar) && !(isFillBar && stepInBar === 15)) return null;
                        return { notes: [leadHigh[0], leadHigh[1], leadHigh[2]], duration: stepInBar === 15 ? '16n' : stepInBar === 12 ? '8n' : '8n.', velocity: 0.18 + 0.1 * sectionProfile.accentActivity };
                    case 'Ambient':
                        if (stepInBar !== 8) return null;
                        return { notes: [withOctave(chordTones[1], 6), withOctave(chordTones[3], 6)], duration: '2n', velocity: 0.08 + 0.06 * sectionProfile.accentActivity };
                    case 'CyberPunk':
                        if (!phraseState.accentMask.includes(stepInBar)) return null;
                        return { notes: [withOctave(chordTones[0], 4), withOctave(chordTones[2], 4)], duration: '16n', velocity: 0.18 + 0.12 * sectionProfile.accentActivity };
                    case 'LoFi':
                        if (!phraseState.accentMask.includes(stepInBar)) return null;
                        return { notes: [withOctave(chordTones[1], 4), withOctave(chordTones[2], 4)], duration: '8n', velocity: 0.1 + 0.08 * sectionProfile.accentActivity };
                    case 'Glitch':
                        if (Math.random() > 0.7 * sectionProfile.accentActivity) return null;
                        return { notes: [scaleAt(phraseState.turnaroundTone, pickRandom([4, 5, 6]))], duration: pickRandom(['32n', '16n']), velocity: 0.16 + Math.random() * 0.14 };
                    case 'VoidCore':
                        if (!phraseState.accentMask.includes(stepInBar)) return null;
                        return { notes: [withOctave(chordTones[0], 4), withOctave(chordTones[3], 4)], duration: '8n', velocity: 0.18 + 0.1 * sectionProfile.accentActivity };
                    default:
                        return null;
                }
            };

            const getSubBassEvent = (moodName, chord, stepInBar, sectionName, isFillBar) => {
                const sectionProfile = SECTION_PROFILES[sectionName] || SECTION_PROFILES.Verse;
                if (Math.random() > sectionProfile.subBass) return null;

                switch (moodName) {
                    case 'CyberPunk':
                        if (![0, 4, 8, 12].includes(stepInBar)) return null;
                        return { note: stepInBar % 8 === 0 ? chord.tones[0] : chord.bass, duration: isFillBar && stepInBar === 12 ? '16n' : '8n', velocity: 0.82 + 0.08 * sectionProfile.subBass };
                    case 'VoidCore':
                        if (![0, 2, 4, 6, 8, 10, 12, 14].includes(stepInBar)) return null;
                        return { note: stepInBar % 4 === 0 ? chord.tones[0] : chord.tones[2], duration: '8n', velocity: 0.52 + 0.12 * sectionProfile.subBass };
                    case 'Ambient':
                        if (stepInBar !== 0) return null;
                        return { note: chord.bass, duration: '1m', velocity: 0.18 + 0.08 * sectionProfile.subBass };
                    case 'Glitch':
                        if (Math.random() > 0.78) return null;
                        return { note: Math.random() > 0.5 ? chord.bass : chord.tones[0], duration: '16n', velocity: 0.35 };
                    default:
                        return null;
                }
            };

            const getPadEvent = (moodName, chord, stepInBar, sectionName, phraseBar, isFillBar) => {
                const brightChord = [withOctave(chord.chord[0], 4), withOctave(chord.chord[1], 4), withOctave(chord.chord[2], 4), withOctave(chord.chord[3], 5)];
                const lowChord = [withOctave(chord.chord[0], 3), withOctave(chord.chord[2], 3), withOctave(chord.chord[3], 4)];

                switch (moodName) {
                    case 'SynthPop':
                        if ((sectionName === 'Intro' ? [0, 8] : [0, 4, 8, 12]).includes(stepInBar)) {
                            return { notes: brightChord, duration: stepInBar === 12 && isFillBar ? '8n' : '4n', velocity: sectionName === 'Chorus' ? 0.42 : 0.3, reset: stepInBar === 0 };
                        }
                        return null;
                    case 'Ambient':
                        if (stepInBar === 0) {
                            return { notes: [...brightChord, withOctave(chord.chord[1], 5)], duration: '1m', velocity: sectionName === 'Intro' ? 0.16 : 0.24, reset: true };
                        }
                        return null;
                    case 'CyberPunk':
                        if ([0, 8, 12].includes(stepInBar) && sectionName !== 'Intro') {
                            return { notes: lowChord, duration: '8n', velocity: 0.24, reset: stepInBar === 0 };
                        }
                        if (sectionName === 'Intro' && stepInBar === 0) {
                            return { notes: lowChord, duration: '2n', velocity: 0.14, reset: true };
                        }
                        return null;
                    case 'LoFi':
                        if ([0, 7].includes(stepInBar)) {
                            return { notes: [withOctave(chord.chord[0], 4), withOctave(chord.chord[1], 4), withOctave(chord.chord[3], 4)], duration: stepInBar === 0 ? '2n' : '4n', velocity: 0.18, reset: stepInBar === 0 };
                        }
                        return null;
                    case 'Glitch':
                        if ([0, 3, 6, 10, 14].includes(stepInBar) && (Math.random() > 0.28 || isFillBar)) {
                            return { notes: stepInBar % 2 === 0 ? brightChord.slice(0, 3) : lowChord, duration: pickRandom(['16n', '8n']), velocity: 0.16 + Math.random() * 0.12, reset: stepInBar === 0 };
                        }
                        return null;
                    case 'VoidCore':
                        if ([0, 4, 8, 12].includes(stepInBar)) {
                            return { notes: [withOctave(chord.chord[0], 3), withOctave(chord.chord[2], 3), withOctave(chord.chord[3], 4)], duration: '8n.', velocity: sectionName === 'Chorus' ? 0.28 : 0.22, reset: stepInBar === 0 };
                        }
                        return null;
                    default:
                        return null;
                }
            };

            const triggerPercussionLayer = (moodName, stepInBar, time, sectionName, isFillBar) => {
                if (!percRef.current) return;
                const sectionProfile = SECTION_PROFILES[sectionName] || SECTION_PROFILES.Verse;
                if (Math.random() > sectionProfile.percussion) return;

                if (moodName === 'SynthPop') {
                    if ([2, 6, 10, 14].includes(stepInBar)) percRef.current.shaker.triggerAttackRelease('32n', time, 0.12);
                    if ([7, 15].includes(stepInBar)) percRef.current.clap.triggerAttackRelease(time, 0.22);
                    if (isFillBar && [14, 15].includes(stepInBar)) percRef.current.clap.triggerAttackRelease(time, 0.28);
                } else if (moodName === 'CyberPunk') {
                    if ([4, 12].includes(stepInBar)) percRef.current.clap.triggerAttackRelease(time, 0.35);
                    if ([2, 6, 10, 14].includes(stepInBar)) percRef.current.metal.triggerAttackRelease(time, '16n', 0.18);
                    if (sectionName === 'Lift' && [15].includes(stepInBar)) percRef.current.metal.triggerAttackRelease(time, '32n', 0.22);
                } else if (moodName === 'LoFi') {
                    if ([2, 5, 6, 10, 13, 14].includes(stepInBar)) percRef.current.brush.triggerAttackRelease(time, stepInBar % 4 === 2 ? 0.1 : 0.16);
                    if ([3, 11].includes(stepInBar)) percRef.current.shaker.triggerAttackRelease('32n', time, 0.05);
                    if (isFillBar && [14, 15].includes(stepInBar)) percRef.current.brush.triggerAttackRelease(time, 0.2);
                } else if (moodName === 'Glitch') {
                    if (Math.random() > 0.7) percRef.current.click.triggerAttackRelease(time, 0.1 + Math.random() * 0.12);
                } else if (moodName === 'VoidCore') {
                    if ([3, 7, 11, 15].includes(stepInBar)) percRef.current.tom.triggerAttackRelease('C2', '16n', time, 0.42);
                    if (isFillBar && [14, 15].includes(stepInBar)) percRef.current.tom.triggerAttackRelease('D2', '32n', time, 0.46);
                } else if (moodName === 'Ambient') {
                    if (stepInBar === 12 && Math.random() > 0.5) percRef.current.shaker.triggerAttackRelease('16n', time, 0.06);
                }
            };

            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = 1.45;
                utterance.rate = 1.02;
                utterance.volume = 0.92;
                const voices = window.speechSynthesis.getVoices();
                const preferred = voices.find((voice) => voice.name.includes('Google') || voice.name.includes('Samantha') || voice.name.includes('Female'));
                if (preferred) utterance.voice = preferred;
                window.speechSynthesis.speak(utterance);
            };

            const cleanupEngine = useCallback(() => {
                engineGenerationRef.current += 1;
                engineRef.current.forEach((node) => { if (node && node.dispose) node.dispose(); });
                engineRef.current = [];
                leadRef.current = null;
                accentRef.current = null;
                bassRef.current = null;
                subBassRef.current = null;
                padRef.current = null;
                drumRef.current = null;
                percRef.current = null;
                masterVolumeRef.current = null;
            }, []);

            const initAudio = useCallback((activeMoodName = melodyMoodRef.current, nextTempo = tempo, nextGroove = grooveAmount) => {
                const activeMood = MOODS[activeMoodName] || MOODS.SynthPop;
                const audioProfile = GENRE_AUDIO_PROFILES[activeMoodName] || GENRE_AUDIO_PROFILES.SynthPop;
                const engineGeneration = engineGenerationRef.current + 1;
                engineGenerationRef.current = engineGeneration;
                const nodes = [];
                const limiter = new Tone.Limiter(-1).toDestination();
                const masterBus = new Tone.Volume(masterVolume).connect(limiter);
                masterVolumeRef.current = masterBus;
                nodes.push(limiter, masterBus);

                const bassDist = new Tone.Distortion(audioProfile.bass.distortion ?? activeMood.bassDist).connect(masterBus);
                const bassFilter = new Tone.Filter(audioProfile.bass.filter.frequency, audioProfile.bass.filter.type).connect(bassDist);
                bassRef.current = createMonoInstrument(audioProfile.bass).connect(bassFilter);
                nodes.push(bassDist, bassFilter, bassRef.current);

                const subBassFilter = new Tone.Filter(audioProfile.subBass.filter.frequency, audioProfile.subBass.filter.type).connect(masterBus);
                subBassRef.current = createMonoInstrument(audioProfile.subBass).connect(subBassFilter);
                nodes.push(subBassFilter, subBassRef.current);

                const padChorus = new Tone.Chorus(audioProfile.pad.chorus.frequency, audioProfile.pad.chorus.delayTime, audioProfile.pad.chorus.depth).connect(masterBus);
                const padReverb = new Tone.Reverb(audioProfile.pad.reverb).connect(padChorus);
                const padFilter = new Tone.Filter(audioProfile.pad.filter.frequency, audioProfile.pad.filter.type).connect(padReverb);
                let padBus = padFilter;
                nodes.push(padChorus, padReverb, padFilter);
                if (audioProfile.pad.crusherBits) {
                    const padCrusher = new Tone.BitCrusher(audioProfile.pad.crusherBits).connect(padFilter);
                    nodes.push(padCrusher);
                    padBus = padCrusher;
                }
                padRef.current = createPolyInstrument(audioProfile.pad).connect(padBus);
                nodes.push(padRef.current);

                const accentDelay = new Tone.PingPongDelay(audioProfile.accent.delay.time, audioProfile.accent.delay.feedback).connect(masterBus);
                accentRef.current = createPolyInstrument(audioProfile.accent).connect(accentDelay);
                nodes.push(accentDelay, accentRef.current);

                const leadDelay = new Tone.FeedbackDelay(audioProfile.lead.delay.time, audioProfile.lead.delay.feedback).connect(masterBus);
                const leadReverb = new Tone.Reverb(audioProfile.lead.reverb).connect(leadDelay);
                const leadFilter = new Tone.Filter(audioProfile.lead.filter.frequency, audioProfile.lead.filter.type).connect(leadReverb);
                let leadBus = leadFilter;
                nodes.push(leadDelay, leadReverb, leadFilter);
                if (audioProfile.lead.crusherBits) {
                    const leadCrusher = new Tone.BitCrusher(audioProfile.lead.crusherBits).connect(leadFilter);
                    nodes.push(leadCrusher);
                    leadBus = leadCrusher;
                }
                const leadVibrato = new Tone.Vibrato(audioProfile.lead.vibrato.frequency, audioProfile.lead.vibrato.depth).connect(leadBus);
                leadRef.current = createMonoInstrument(audioProfile.lead).connect(leadVibrato);
                nodes.push(leadVibrato, leadRef.current);

                const drumComp = new Tone.Compressor(-18, 3).connect(masterBus);
                const kick = new Tone.MembraneSynth({ pitchDecay: audioProfile.drums.kick.pitchDecay, octaves: audioProfile.drums.kick.octaves }).connect(drumComp);
                const snare = new Tone.NoiseSynth({ noise: { type: audioProfile.drums.snare.noise }, envelope: { attack: 0.001, decay: audioProfile.drums.snare.decay, sustain: 0 } }).connect(drumComp);
                const hihat = new Tone.MetalSynth({ frequency: audioProfile.drums.hihat.frequency, envelope: { attack: 0.001, decay: audioProfile.drums.hihat.decay, release: 0.01 }, harmonicity: audioProfile.drums.hihat.harmonicity, modulationIndex: audioProfile.drums.hihat.modulationIndex, resonance: audioProfile.drums.hihat.resonance }).connect(drumComp);
                const rumbleDist = new Tone.Distortion(activeMoodName === 'CyberPunk' ? 0.62 : 0.2).connect(masterBus);
                const rumbleFilter = new Tone.Filter(activeMoodName === 'CyberPunk' ? 140 : 90, 'lowpass').connect(rumbleDist);
                const rumble = new Tone.NoiseSynth({ noise: { type: 'brown' }, envelope: { attack: 0.02, decay: activeMoodName === 'CyberPunk' ? 0.48 : 0.16, sustain: 0, release: 0.08 } }).connect(rumbleFilter);
                const ride = new Tone.MetalSynth({ frequency: activeMoodName === 'LoFi' ? 180 : 240, envelope: { attack: 0.001, decay: activeMoodName === 'LoFi' ? 0.14 : 0.08, release: 0.02 }, harmonicity: activeMoodName === 'LoFi' ? 2.4 : 3.6, modulationIndex: activeMoodName === 'LoFi' ? 7 : 12, resonance: activeMoodName === 'LoFi' ? 900 : 1500 }).connect(drumComp);
                drumRef.current = { kick, snare, hihat, rumble, ride };
                nodes.push(drumComp, kick, snare, hihat, rumbleDist, rumbleFilter, rumble, ride);

                const percBus = new Tone.Filter(audioProfile.percussion.highpass, 'highpass').connect(masterBus);
                const clap = new Tone.NoiseSynth({ noise: { type: audioProfile.percussion.clapNoise }, envelope: { attack: 0.001, decay: 0.11, sustain: 0, release: 0.02 } }).connect(percBus);
                const brush = new Tone.NoiseSynth({ noise: { type: audioProfile.percussion.brushNoise }, envelope: { attack: 0.002, decay: 0.07, sustain: 0, release: 0.02 } }).connect(percBus);
                const click = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.03, sustain: 0, release: 0.005 } }).connect(percBus);
                const tom = new Tone.MembraneSynth({ pitchDecay: 0.02, octaves: activeMoodName === 'VoidCore' ? 4.2 : 3.2 }).connect(masterBus);
                const metal = new Tone.MetalSynth({ frequency: audioProfile.percussion.metalFrequency, envelope: { attack: 0.001, decay: 0.09, release: 0.01 }, harmonicity: 3.4, modulationIndex: 18, resonance: 1800 }).connect(percBus);
                const shaker = new Tone.NoiseSynth({ noise: { type: audioProfile.percussion.shakerNoise }, envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.01 } }).connect(percBus);
                percRef.current = { clap, brush, click, tom, metal, shaker };
                nodes.push(percBus, clap, brush, click, tom, metal, shaker);

                engineRef.current = nodes;

                const meter = new Tone.Meter();
                masterBus.connect(meter);
                const updateMeter = () => {
                    if (!isPlayingRef.current) return;
                    setMeterValue(meter.getValue());
                    requestAnimationFrame(updateMeter);
                };
                updateMeter();

                Tone.Transport.bpm.value = nextTempo;
                Tone.Transport.swing = nextGroove;
                Tone.Transport.swingSubdivision = '16n';

                Tone.Transport.scheduleRepeat((time) => {
                    if (engineGeneration !== engineGenerationRef.current) return;
                    const totalTicks = Tone.Transport.getTicksAtTime(time);
                    const sixteenthTicks = Tone.Transport.PPQ / 4;
                    const totalSixteenthSteps = Math.floor(totalTicks / sixteenthTicks);
                    const sequenceStep = totalSixteenthSteps % 64;
                    const stepInBar = sequenceStep % 16;
                    const arrangementBar = Math.floor(totalSixteenthSteps / 16);
                    const phraseBar = arrangementBar % 4;
                    const isFillBar = phraseBar === 3;
                    const songbook = getSongbook(melodyMoodRef.current);
                    const progression = songbook.progression;
                    const barIndex = arrangementBar % progression.length;
                    const sectionSequence = songbook.sections;
                    const sectionName = sectionSequence[Math.floor(arrangementBar / 4) % sectionSequence.length];
                    const sectionProfile = SECTION_PROFILES[sectionName] || SECTION_PROFILES.Verse;

                    Tone.Draw.schedule(() => {
                        setTransportStep(stepInBar);
                        setActiveBar(barIndex + 1);
                        if (currentSectionRef.current !== sectionName) {
                            currentSectionRef.current = sectionName;
                            setCurrentSection(sectionName);
                        }
                    }, time);

                    if (isAutoModeRef.current && sequenceStep === 0 && arrangementBar > 0 && arrangementBar % 16 === 0) {
                        const nextMood = pickRandom(MOOD_KEYS);
                        const nextTempo = getAutoTempoForMood(nextMood);
                        Tone.Draw.schedule(() => {
                            clearVocalQueue();
                            setMelodyMood(nextMood);
                            setTempo(nextTempo);
                            setGrooveAmount(MOODS[nextMood].swing);
                            setCurrentSection('Intro');
                            currentSectionRef.current = 'Intro';
                            phraseStateRef.current = { key: '', value: buildPhraseState(nextMood, MOODS[nextMood]) };
                            lastVocalCueRef.current = '';
                            cleanupEngine();
                            Tone.Transport.stop();
                            Tone.Transport.cancel(0);
                            initAudio(nextMood, nextTempo, MOODS[nextMood].swing);
                            Tone.Transport.start();
                            addLog(`AUTO-PILOT: Re-architecting ${nextMood.toUpperCase()} at ${nextTempo} BPM...`);
                            speak(`Switching to ${nextMood}.`);
                        }, time);
                    }

                    const moodName = melodyMoodRef.current;
                    const mood = MOODS[moodName] || MOODS.SynthPop;
                    const liveSongbook = getSongbook(moodName);
                    const chord = liveSongbook.progression[arrangementBar % liveSongbook.progression.length];
                    const currentScale = SCALES[mood.scales] || SCALES.stable;

                    const phraseKey = `${moodName}:${sectionName}:${Math.floor(arrangementBar / 4)}`;
                    if (phraseStateRef.current.key !== phraseKey) {
                        phraseStateRef.current = { key: phraseKey, value: buildPhraseState(moodName, mood) };
                        if (stepInBar === 0) {
                            Tone.Draw.schedule(() => addLog(`SECTION: ${sectionName.toUpperCase()} - phrase lock engaged.`), time);
                        }
                    }
                    const phraseState = phraseStateRef.current.value;

                    if (stepInBar === 0 && isVocalModeRef.current && sectionName !== 'Intro' && (phraseBar === 0 || phraseBar === 2 || (sectionName === 'Chorus' && phraseBar === 3))) {
                        queueSungPhrase(moodName, sectionName, chord, phraseState, arrangementBar);
                    }

                    if (drumRef.current) {
                        const kickSteps = {
                            techno: [0, 4, 8, 12],
                            breakbeat: [0, 3, 10],
                            industrial: [0, 2, 4, 6, 8, 10, 12, 14],
                            lazy: [0, 10],
                            minimal: [0],
                            erratic: [0, 5, 7, 10, 13]
                        }[mood.drumStyle] || [0, 4, 8, 12];

                        const snareSteps = {
                            techno: [4, 12],
                            breakbeat: [4, 12],
                            industrial: [2, 6, 10, 14],
                            lazy: [4, 12],
                            minimal: [12],
                            erratic: [3, 9, 12, 15]
                        }[mood.drumStyle] || [4, 12];

                        const hatSteps = {
                            techno: [2, 6, 10, 14],
                            breakbeat: [2, 6, 7, 11, 14, 15],
                            industrial: [1, 3, 5, 7, 9, 11, 13, 15],
                            lazy: [3, 7, 11, 15],
                            minimal: [8, 15],
                            erratic: [1, 2, 4, 6, 8, 11, 13, 15]
                        }[mood.drumStyle] || [2, 6, 10, 14];

                        if (kickSteps.includes(stepInBar)) {
                            const kickVelocity = mood.drumStyle === 'techno' ? 1 : mood.drumStyle === 'industrial' ? 0.9 : 0.72;
                            const liveAudioProfile = GENRE_AUDIO_PROFILES[moodName] || GENRE_AUDIO_PROFILES.SynthPop;
                            drumRef.current.kick.triggerAttackRelease(liveAudioProfile.drums.kick.note, mood.drumStyle === 'techno' ? '8n' : '16n', time, kickVelocity);
                            if (moodName === 'CyberPunk' && drumRef.current.rumble) {
                                drumRef.current.rumble.triggerAttackRelease('8n', time + Tone.Time('32n').toSeconds(), 0.28 + 0.08 * sectionProfile.subBass);
                            }
                        }

                        if (snareSteps.includes(stepInBar)) {
                            drumRef.current.snare.triggerAttackRelease(time, mood.drumStyle === 'minimal' ? 0.32 : 0.75);
                        }

                        if (moodName === 'LoFi' && [3, 11, 15].includes(stepInBar)) {
                            drumRef.current.snare.triggerAttackRelease(time, 0.14 + (stepInBar === 15 ? 0.06 : 0));
                        }

                        if (hatSteps.includes(stepInBar)) {
                            const hatDuration = mood.drumStyle === 'glitch' ? '64n' : stepInBar % 2 === 0 ? '32n' : '16n';
                            const hatVelocity = (mood.drumStyle === 'industrial' ? 0.24 : mood.drumStyle === 'minimal' ? 0.12 : 0.18 + Math.random() * 0.08) * sectionProfile.percussion;
                            drumRef.current.hihat.triggerAttackRelease(time, hatDuration, hatVelocity);
                        }

                        if (moodName === 'LoFi' && [1, 5, 9, 13].includes(stepInBar) && drumRef.current.ride) {
                            drumRef.current.ride.triggerAttackRelease('16n', time, 0.08 + (stepInBar === 13 ? 0.03 : 0));
                        }

                        if (mood.drumStyle === 'erratic' && Math.random() > 0.82) {
                            drumRef.current.snare.triggerAttackRelease(time, 0.45);
                        }

                        if (isFillBar && [14, 15].includes(stepInBar)) {
                            drumRef.current.snare.triggerAttackRelease(time, 0.42 + 0.18 * sectionProfile.percussion);
                        }
                    }

                    triggerPercussionLayer(moodName, stepInBar, time, sectionName, isFillBar);

                    if (mood.bassPattern.includes(stepInBar) && bassRef.current) {
                        let bassNote = chord.bass;
                        let bassDuration = '8n';
                        let bassVelocity = 0.68;

                        if (mood.bassComplexity === 'melodic' && stepInBar > 0) {
                            if (Math.random() > 0.55) bassNote = pickRandom(chord.tones);
                            bassVelocity = 0.7;
                        } else if (mood.bassComplexity === 'walking') {
                            bassNote = stepInBar % 8 === 0 ? chord.tones[0] : chord.tones[2];
                            bassVelocity = 0.56;
                        } else if (mood.bassComplexity === 'jitter') {
                            bassNote = Math.random() > 0.5 ? chord.bass.replace('1', '2') : pickRandom(chord.tones);
                            bassDuration = Math.random() > 0.5 ? '16n' : '8n';
                            bassVelocity = 0.5 + Math.random() * 0.2;
                        } else if (mood.bassComplexity === 'driving') {
                            bassNote = stepInBar % 4 === 0 ? chord.tones[0] : chord.tones[2];
                            bassVelocity = 0.84;
                        } else if (mood.bassComplexity === 'heavy') {
                            bassNote = stepInBar % 8 === 0 ? chord.tones[0] : chord.tones[2];
                            bassDuration = stepInBar % 8 === 0 ? '4n' : '8n';
                            bassVelocity = 0.94;
                        } else if (mood.bassComplexity === 'drone') {
                            bassDuration = '2n';
                            bassVelocity = 0.4;
                        }

                        if (isFillBar && stepInBar >= 14 && mood.bassComplexity !== 'drone') {
                            bassDuration = '16n';
                            bassNote = chord.tones[phraseState.turnaroundTone % chord.tones.length];
                        }

                        bassVelocity *= sectionProfile.subBass;
                        bassRef.current.triggerAttackRelease(bassNote, bassDuration, time, bassVelocity);
                        if (stepInBar === 0) addLog(`BASS: Anchoring ${chord.root} Harmonic Field`);
                    }

                    const subBassEvent = getSubBassEvent(moodName, chord, stepInBar, sectionName, isFillBar);
                    if (subBassEvent && subBassRef.current) {
                        subBassRef.current.triggerAttackRelease(subBassEvent.note, subBassEvent.duration, time, subBassEvent.velocity);
                    }

                    const padEvent = getPadEvent(moodName, chord, stepInBar, sectionName, phraseBar, isFillBar);
                    if (padEvent && padRef.current) {
                        if (padEvent.reset) padRef.current.releaseAll(time);
                        padRef.current.triggerAttackRelease(padEvent.notes, padEvent.duration, time, padEvent.velocity);
                    }

                    const leadEvent = getLeadEvent(moodName, mood, chord, currentScale, stepInBar, barIndex, phraseState, sectionName, phraseBar, isFillBar);
                    if (leadEvent && leadRef.current) {
                        leadRef.current.triggerAttackRelease(leadEvent.note, leadEvent.duration, time, leadEvent.velocity);
                    }

                    const accentEvent = getAccentEvent(moodName, mood, chord, currentScale, stepInBar, barIndex, phraseState, sectionName, isFillBar);
                    if (accentEvent && accentRef.current) {
                        accentRef.current.triggerAttackRelease(accentEvent.notes, accentEvent.duration, time, accentEvent.velocity);
                    }
                }, '16n');
            }, [addLog, cleanupEngine, clearVocalQueue, grooveAmount, masterVolume, queueSungPhrase, tempo]);

            const restartAudioEngine = useCallback((nextMoodName, nextTempo = tempo, nextGroove = grooveAmount) => {
                if (Tone.Transport.state !== 'started') return;
                clearVocalQueue();
                Tone.Transport.stop();
                Tone.Transport.cancel(0);
                cleanupEngine();
                initAudio(nextMoodName, nextTempo, nextGroove);
                Tone.Transport.start();
            }, [cleanupEngine, clearVocalQueue, grooveAmount, initAudio, tempo]);

            const togglePlay = async () => {
                if (!isPlaying) {
                    addLog('CORE ENGAGED: Bypassing Filters...');
                    speak('Machine consciousness activated. Procedural stream live.');
                    await Tone.start();
                    isPlayingRef.current = true;
                    initAudio(melodyMoodRef.current, tempo, grooveAmount);
                    Tone.Transport.start();
                    setIsPlaying(true);
                    return;
                }

                addLog('CORE OFFLINE.');
                speak('System purge complete.');
                clearVocalQueue();
                if (isRecording) {
                    if (recorderRef.current && recorderRef.current.state !== 'inactive') recorderRef.current.stop();
                }
                Tone.Transport.stop();
                Tone.Transport.cancel(0);
                cleanupEngine();
                isPlayingRef.current = false;
                setIsPlaying(false);
                setMeterValue(-60);
                setTransportStep(0);
                setActiveBar(1);
                setCurrentSection('Intro');
                currentSectionRef.current = 'Intro';
                lastVocalCueRef.current = '';
            };

            const changeMood = (moodName) => {
                clearVocalQueue();
                setMelodyMood(moodName);
                setGrooveAmount(MOODS[moodName].swing);
                setCurrentSection('Intro');
                currentSectionRef.current = 'Intro';
                phraseStateRef.current = { key: '', value: buildPhraseState(moodName, MOODS[moodName]) };
                lastVocalCueRef.current = '';
                restartAudioEngine(moodName, tempo, MOODS[moodName].swing);
                addLog(`ARCHITECTURE: Building ${moodName.toUpperCase()} structure...`);
                speak(`Architecture shift: ${moodName}.`);
            };

            const toggleAutoMode = () => {
                const nextState = !isAutoMode;
                setIsAutoMode(nextState);
                if (nextState) {
                    addLog('AUTO-PILOT: KAI is taking control...');
                    speak("Hands off. I've got this.");
                } else {
                    addLog('AUTO-PILOT: Manual override active.');
                    speak('Manual override. Back to you.');
                }
            };

            const toggleVocalMode = () => {
                const nextState = !isVocalMode;
                setIsVocalMode(nextState);
                lastVocalCueRef.current = '';
                if (!nextState) {
                    clearVocalQueue();
                    addLog('VOCALS: Synth singer muted.');
                    return;
                }
                addLog('VOCALS: Browser choir armed.');
            };

            const cycleVocalStyle = () => {
                const styleKeys = Object.keys(VOCAL_STYLE_PRESETS);
                const currentIndex = styleKeys.indexOf(vocalStyleRef.current);
                const nextStyle = styleKeys[(currentIndex + 1) % styleKeys.length];
                setVocalStyle(nextStyle);
                lastVocalCueRef.current = '';
                clearVocalQueue();
                addLog(`VOCALS: Style shifted to ${nextStyle.toUpperCase()}.`);
            };

            const applyPerformanceScene = (scene) => {
                clearVocalQueue();
                setMelodyMood(scene.mood);
                setTempo(scene.tempo);
                setGrooveAmount(scene.groove);
                setVocalStyle(scene.vocalStyle);
                setIsDuetMode(scene.duet);
                setIsVocalMode(scene.vocals);
                setCurrentSection('Intro');
                currentSectionRef.current = 'Intro';
                phraseStateRef.current = { key: '', value: buildPhraseState(scene.mood, MOODS[scene.mood]) };
                lastVocalCueRef.current = '';
                restartAudioEngine(scene.mood, scene.tempo, scene.groove);
                addLog(`SCENE: ${scene.name.toUpperCase()} loaded.`);
            };

            const toggleDuetMode = () => {
                const nextState = !isDuetModeRef.current;
                setIsDuetMode(nextState);
                lastVocalCueRef.current = '';
                clearVocalQueue();
                addLog(`VOCALS: Duet ${nextState ? 'linked' : 'solo'} mode engaged.`);
            };

            const saveLyricDraft = () => {
                const parsedLines = parseVocalLines(lyricDraft);
                if (!parsedLines.length) {
                    addLog('VOCALS: Lyric editor needs at least one line.');
                    return;
                }
                setVocalBank((prev) => ({
                    ...prev,
                    [melodyMood]: {
                        ...prev[melodyMood],
                        [lyricSection]: parsedLines
                    }
                }));
                lastVocalCueRef.current = '';
                addLog(`VOCALS: ${melodyMood.toUpperCase()} ${lyricSection.toUpperCase()} hooks rewritten.`);
            };

            const resetLyricDraft = () => {
                const fallback = VOCAL_BANK[melodyMood]?.[lyricSection] || [];
                setVocalBank((prev) => ({
                    ...prev,
                    [melodyMood]: {
                        ...prev[melodyMood],
                        [lyricSection]: fallback
                    }
                }));
                setLyricDraft(formatVocalLines(fallback));
                lastVocalCueRef.current = '';
                addLog(`VOCALS: ${melodyMood.toUpperCase()} ${lyricSection.toUpperCase()} hooks reset.`);
            };

            const startRecording = () => {
                if (!isPlaying) {
                    addLog('REC: Playback must be active before capture.');
                    return;
                }
                if (!window.MediaRecorder) {
                    addLog('REC: MediaRecorder unavailable in this browser.');
                    return;
                }

                resetRecording();
                cleanupRecorderTap();
                chunks.current = [];
                const stream = Tone.getDestination().context.createMediaStreamDestination();
                recorderDestinationRef.current = stream;
                Tone.getDestination().connect(stream);

                const mimeType = chooseRecorderMimeType();
                recorderMimeTypeRef.current = mimeType || 'audio/webm';
                recorderRef.current = mimeType ? new MediaRecorder(stream.stream, { mimeType }) : new MediaRecorder(stream.stream);

                recorderRef.current.ondataavailable = (event) => {
                    if (event.data.size > 0) chunks.current.push(event.data);
                };

                recorderRef.current.onstop = () => {
                    const blob = new Blob(chunks.current, { type: recorderMimeTypeRef.current });
                    const url = URL.createObjectURL(blob);
                    setRecordedUrl(url);
                    setRecordedFileName(createRecordingFileName(melodyMoodRef.current, recorderMimeTypeRef.current));
                    setIsRecording(false);
                    chunks.current = [];
                    cleanupRecorderTap();
                    addLog('REC: Session captured. Artifact staged for preview and download.');
                };

                recorderRef.current.start(250);
                recordingStartedAtRef.current = Date.now();
                setRecordingSeconds(0);
                setIsRecording(true);
                addLog('REC: Direct buffer tap started.');
            };

            const stopRecording = () => {
                if (recorderRef.current && recorderRef.current.state !== 'inactive') {
                    recorderRef.current.stop();
                    addLog('REC: Finalizing current take...');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center relative">
                    <div className="w-full max-w-6xl flex flex-col gap-4 mb-8">
                        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-gradient-to-br from-orange-500 to-sky-500 rounded-[1.6rem] flex items-center justify-center shadow-[0_0_40px_rgba(56,189,248,0.28)] rotate-3 hover:rotate-0 transition-all cursor-pointer">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                </div>
                                <div>
                                    <h1 className="text-4xl md:text-5xl font-bold tracking-[-0.08em] uppercase leading-none">KAI-OS <span className="text-orange-400">105</span></h1>
                                    <p className="text-[10px] font-mono text-slate-400 uppercase tracking-[0.42em] mt-2">Procedural Resistance Console</p>
                                </div>
                            </div>
                            <div className="flex flex-wrap items-center gap-3">
                                <div className="px-4 py-2 rounded-full border border-slate-700/80 bg-slate-950/60 text-[10px] uppercase tracking-[0.3em] font-mono text-slate-300">
                                    {currentMood.energy} Energy
                                </div>
                                <button
                                    onClick={toggleAutoMode}
                                    className={`px-5 py-3 rounded-full text-[10px] font-bold tracking-[0.26em] uppercase flex items-center gap-3 transition-all border ${isAutoMode ? 'bg-sky-600 border-sky-400 text-white auto-pulse shadow-[0_0_20px_rgba(37,99,235,0.35)]' : 'bg-slate-900/80 border-slate-700 text-slate-300'}`}
                                >
                                    <div className={`w-2 h-2 rounded-full ${isAutoMode ? 'bg-white animate-pulse' : 'bg-slate-500'}`}></div>
                                    {isAutoMode ? 'Auto Pilot Active' : 'Manual Selector'}
                                </button>
                            </div>
                        </div>

                        <div className="glass-panel rounded-[2rem] px-5 py-4 flex flex-wrap items-center gap-3 md:gap-4 text-[10px] uppercase tracking-[0.3em] font-mono text-slate-300">
                            <span className="text-slate-500">Live signature</span>
                            <span className="text-orange-300">{currentMood.accent}</span>
                            <span className="text-slate-500">Tempo band</span>
                            <span className="text-sky-300">{tempoBandLabel}</span>
                            <span className="text-slate-500">Groove</span>
                            <span>{Math.round(grooveAmount * 100)}%</span>
                            <span className="text-slate-500">Bar</span>
                            <span>{activeBar}/{currentSongbook.progression.length}</span>
                            <span className="text-slate-500">Section</span>
                            <span>{currentSection}</span>
                        </div>
                    </div>

                    <div className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-8 space-y-6">
                            <div className="glass-panel rounded-[2.6rem] p-6 md:p-10 relative overflow-hidden min-h-[23rem] flex flex-col justify-between">
                                <div className="absolute inset-0 pointer-events-none opacity-60">
                                    <div className="absolute -top-16 right-8 w-48 h-48 rounded-full bg-orange-500/14 blur-3xl"></div>
                                    <div className="absolute bottom-0 left-10 w-56 h-56 rounded-full bg-sky-500/10 blur-3xl"></div>
                                    <div className="absolute inset-x-0 top-20 h-px shimmer"></div>
                                </div>

                                <div className="relative z-10 flex flex-wrap items-center gap-3 mb-8">
                                    <span className="px-3 py-2 rounded-full bg-slate-950/60 border border-slate-700/80 text-[10px] uppercase tracking-[0.26em] font-mono text-slate-300">
                                        {isPlaying ? 'Engine Live' : 'Standby'}
                                    </span>
                                    <span className="px-3 py-2 rounded-full bg-slate-950/60 border border-slate-700/80 text-[10px] uppercase tracking-[0.26em] font-mono text-slate-300">
                                        {tempo} BPM
                                    </span>
                                    <span className="px-3 py-2 rounded-full bg-slate-950/60 border border-slate-700/80 text-[10px] uppercase tracking-[0.26em] font-mono text-slate-300">
                                        Output {masterVolume} dB
                                    </span>
                                    <span className="px-3 py-2 rounded-full bg-slate-950/60 border border-slate-700/80 text-[10px] uppercase tracking-[0.26em] font-mono text-slate-300">
                                        Section {currentSection}
                                    </span>
                                    <span className={`px-3 py-2 rounded-full border text-[10px] uppercase tracking-[0.26em] font-mono ${isVocalMode ? 'bg-fuchsia-500/15 border-fuchsia-400/40 text-fuchsia-200' : 'bg-slate-950/60 border-slate-700/80 text-slate-500'}`}>
                                        {isVocalMode ? `${vocalStyle}${isDuetMode ? ' duet' : ' solo'} vox` : 'Vox muted'}
                                    </span>
                                    <span className="px-3 py-2 rounded-full bg-slate-950/60 border border-slate-700/80 text-[10px] uppercase tracking-[0.26em] font-mono text-slate-300">
                                        {isRecording ? `Recording ${formatSeconds(recordingSeconds)}` : 'Ready to capture'}
                                    </span>
                                </div>

                                <div className="relative z-10 w-full bg-slate-900/80 h-3 rounded-full overflow-hidden mb-8 border border-slate-800 shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-sky-500 via-orange-400 to-fuchsia-400 transition-all duration-75" style={{ width: `${intensityWidth}%` }} />
                                </div>

                                <div className="relative z-10 grid md:grid-cols-[1.2fr_auto] gap-8 items-end">
                                    <div>
                                        <p className="text-slate-400 text-[10px] font-mono uppercase tracking-[0.5em] mb-2 italic">Now Architecting</p>
                                        <h2 className={`text-5xl md:text-7xl font-bold uppercase tracking-[-0.08em] transition-all duration-500 ${isPlaying ? 'text-white glow-orange scale-[1.01]' : 'text-slate-600'}`}>
                                            {isPlaying ? melodyMood : 'Standby'}
                                        </h2>
                                        <p className="mt-4 max-w-2xl text-sm md:text-base text-slate-300 leading-relaxed">{currentMood.signature}</p>
                                        <p className="mt-3 text-[10px] font-mono uppercase tracking-[0.28em] text-slate-400">Active rig: {currentMood.rig.join(' / ')}</p>
                                    </div>
                                    <button onClick={togglePlay} className={`w-24 h-24 md:w-28 md:h-28 rounded-[2rem] flex items-center justify-center transition-all ${isPlaying ? 'bg-red-600 shadow-[0_0_50px_rgba(220,38,38,0.4)]' : 'bg-gradient-to-br from-orange-500 to-sky-500 shadow-[0_0_50px_rgba(56,189,248,0.24)] rotate-45'} hover:scale-105 active:scale-95 group`}>
                                        {isPlaying ? (
                                            <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                                        ) : (
                                            <svg width="36" height="36" viewBox="0 0 24 24" fill="white" className="-rotate-45 ml-1"><path d="M5 3l14 9-14 9V3z" /></svg>
                                        )}
                                    </button>
                                </div>

                                <div className="relative z-10 mt-8 grid grid-cols-8 md:grid-cols-16 gap-2">
                                    {Array.from({ length: 16 }).map((_, step) => (
                                        <div key={step} className={`step-cell rounded-xl h-10 md:h-12 flex items-center justify-center font-mono text-[10px] ${transportStep === step ? 'step-active text-white' : 'text-slate-500'} ${step % 4 === 0 ? 'step-accent' : ''}`}>
                                            {String(step + 1).padStart(2, '0')}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="glass-panel rounded-[2rem] p-5">
                                    <p className="text-[10px] font-mono uppercase tracking-[0.4em] text-slate-500 mb-3">Genre signature</p>
                                    <p className="text-lg font-bold tracking-[-0.04em] text-white">{currentMood.accent}</p>
                                    <p className="text-sm text-slate-400 mt-2">{currentMood.rig.join(' / ')}</p>
                                </div>
                                <div className="glass-panel rounded-[2rem] p-5">
                                    <p className="text-[10px] font-mono uppercase tracking-[0.4em] text-slate-500 mb-3">Auto range</p>
                                    <p className="text-lg font-bold tracking-[-0.04em] text-white">{tempoBandLabel}</p>
                                    <p className="text-sm text-slate-400 mt-2">Auto-mode now snaps to a genre-matched BPM window instead of one static tempo.</p>
                                </div>
                                <div className="glass-panel rounded-[2rem] p-5">
                                    <p className="text-[10px] font-mono uppercase tracking-[0.4em] text-slate-500 mb-3">Current pocket</p>
                                    <p className="text-lg font-bold tracking-[-0.04em] text-white">{Math.round(grooveAmount * 100)}% swing</p>
                                    <p className="text-sm text-slate-400 mt-2">Each mood suggests its own groove profile, but the slider stays editable.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                                {MOOD_KEYS.map((moodName) => (
                                    <button
                                        key={moodName}
                                        disabled={isAutoMode}
                                        onClick={() => changeMood(moodName)}
                                        className={`mood-btn p-6 rounded-[2rem] border text-left group relative overflow-hidden transition-all ${isAutoMode ? 'opacity-35 grayscale cursor-not-allowed' : 'hover:scale-[1.02]'} ${melodyMood === moodName ? 'bg-gradient-to-br from-orange-500/90 to-sky-500/80 border-orange-300 text-white mood-active' : 'glass-panel text-slate-300 hover:border-slate-500'}`}
                                    >
                                        <div className="relative z-10 flex items-start justify-between gap-4">
                                            <div>
                                                <h3 className="font-bold uppercase tracking-[-0.04em] text-2xl mb-2">{moodName}</h3>
                                                <p className="text-[10px] font-mono opacity-80 uppercase leading-tight tracking-[0.24em]">{MOODS[moodName].desc}</p>
                                            </div>
                                            <div className="text-[10px] font-mono px-3 py-2 rounded-full border border-white/20 bg-black/20">
                                                {MOODS[moodName].autoTempoRange[0]}-{MOODS[moodName].autoTempoRange[1]}
                                            </div>
                                        </div>
                                        <p className="relative z-10 mt-4 text-sm leading-relaxed opacity-85">{MOODS[moodName].signature}</p>
                                        <p className="relative z-10 mt-3 text-[10px] font-mono uppercase tracking-[0.22em] opacity-70">{MOODS[moodName].rig.join(' / ')}</p>
                                        {melodyMood === moodName && <div className="absolute top-4 right-4 w-3 h-3 bg-white rounded-full animate-ping"></div>}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass-panel rounded-[2.5rem] p-6 md:p-8 flex flex-col h-[34rem] overflow-hidden">
                                <div className="flex items-center justify-between mb-5">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2.5 h-2.5 rounded-full ${isPlaying ? 'bg-green-400 animate-pulse shadow-[0_0_10px_#4ade80]' : 'bg-slate-600'}`}></div>
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.24em]">Procedural Analysis</h3>
                                    </div>
                                    <span className="text-[8px] font-mono text-slate-600">KAI_V3.4_ENGINE</span>
                                </div>

                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-4">
                                        <p className="text-[10px] uppercase tracking-[0.3em] font-mono text-slate-500 mb-2">Mode</p>
                                        <p className="text-sm font-bold text-white">{isAutoMode ? 'Auto pilot' : 'Manual'}</p>
                                    </div>
                                    <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-4">
                                        <p className="text-[10px] uppercase tracking-[0.3em] font-mono text-slate-500 mb-2">Take</p>
                                        <p className="text-sm font-bold text-white">{isRecording ? formatSeconds(recordingSeconds) : recordedUrl ? 'Captured' : 'Idle'}</p>
                                    </div>
                                    <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-4 col-span-2">
                                        <div className="flex items-center justify-between gap-4">
                                            <div>
                                                <p className="text-[10px] uppercase tracking-[0.3em] font-mono text-slate-500 mb-2">Vocal Layer</p>
                                                <p className="text-sm font-bold text-white">{isVocalMode ? `${vocalStyle} ${isDuetMode ? 'duet' : 'solo'}` : 'Muted'}</p>
                                            </div>
                                            <div className="flex items-center gap-2 flex-wrap justify-end">
                                                <button onClick={toggleDuetMode} className={`px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.24em] border transition-all ${isDuetMode ? 'bg-orange-500/20 text-orange-200 border-orange-400/50' : 'bg-slate-900 text-slate-400 border-slate-700'}`}>
                                                    {isDuetMode ? 'Duet On' : 'Duet Off'}
                                                </button>
                                                <button onClick={cycleVocalStyle} className="px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.24em] border transition-all bg-slate-900 text-slate-300 border-slate-700 hover:border-slate-500">
                                                    Change Style
                                                </button>
                                                <button onClick={toggleVocalMode} className={`px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.24em] border transition-all ${isVocalMode ? 'bg-fuchsia-500/20 text-fuchsia-200 border-fuchsia-400/50' : 'bg-slate-900 text-slate-400 border-slate-700'}`}>
                                                    {isVocalMode ? 'Mute Vox' : 'Enable Vox'}
                                                </button>
                                            </div>
                                        </div>
                                        <p className="mt-3 text-[10px] font-mono uppercase tracking-[0.18em] text-slate-500">Browser TTS hooks now use louder gain, duet call-and-response, harmonized doubles, echo tails, and ad-libs.</p>
                                        <div className="mt-4 flex flex-col gap-2">
                                            <label className="text-[10px] font-mono uppercase tracking-[0.22em] text-slate-500">Voice Select</label>
                                            <select value={selectedVoiceURI} onChange={(event) => setSelectedVoiceURI(event.target.value)} className="w-full rounded-2xl border border-slate-800 bg-black/55 px-4 py-3 text-sm text-slate-200 outline-none focus:border-sky-500/60">
                                                <option value="">Auto voice</option>
                                                {availableVoices.map((voice) => (
                                                    <option key={voice.voiceURI} value={voice.voiceURI}>{voice.name} {voice.lang ? `(${voice.lang})` : ''}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-grow min-h-0 overflow-y-auto font-mono text-[10px] text-green-400/90 space-y-2 log-container pr-3 flex flex-col-reverse rounded-[1.8rem] border border-slate-900 bg-black/55 p-4">
                                    {logs.map((log, index) => (
                                        <div key={index} className={index === 0 ? 'text-green-300 font-bold border-l-4 border-green-400 pl-3 py-1 bg-green-500/5' : 'pl-3 opacity-45 hover:opacity-100 transition-opacity'}>
                                            {log}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-panel rounded-[2.5rem] p-6 md:p-8 space-y-6">
                                <div>
                                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-3">
                                        <span>Tempo Engine</span>
                                        <span className="text-orange-400">{tempo} BPM</span>
                                    </div>
                                    <input type="range" min="80" max="160" value={tempo} onChange={(event) => setTempo(Number(event.target.value))} className="w-full" />
                                </div>

                                <div>
                                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-3">
                                        <span>Groove Amount</span>
                                        <span className="text-sky-300">{Math.round(grooveAmount * 100)}%</span>
                                    </div>
                                    <input type="range" min="0" max="0.3" step="0.01" value={grooveAmount} onChange={(event) => setGrooveAmount(Number(event.target.value))} className="w-full" />
                                </div>

                                <div>
                                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-3">
                                        <span>Master Output</span>
                                        <span className="text-slate-200">{masterVolume} dB</span>
                                    </div>
                                    <input type="range" min="-24" max="0" step="1" value={masterVolume} onChange={(event) => setMasterVolume(Number(event.target.value))} className="w-full" />
                                </div>

                                <div>
                                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-3">
                                        <span>Vocal Gain</span>
                                        <span className="text-fuchsia-300">{Math.round(vocalGain * 100)}%</span>
                                    </div>
                                    <input type="range" min="0.35" max="1" step="0.01" value={vocalGain} onChange={(event) => setVocalGain(Number(event.target.value))} className="w-full" />
                                </div>

                                <div className="rounded-[2rem] border border-slate-800 bg-slate-950/70 p-5 space-y-4">
                                    <div>
                                        <p className="text-[10px] font-mono uppercase tracking-[0.36em] text-slate-500">Performance scenes</p>
                                        <p className="text-sm text-slate-300 mt-2">Snap the engine into a curated live state without rebuilding every control by hand.</p>
                                    </div>
                                    <div className="grid grid-cols-1 gap-3">
                                        {PERFORMANCE_SCENES.map((scene) => (
                                            <button key={scene.name} onClick={() => applyPerformanceScene(scene)} className="rounded-[1.5rem] border border-slate-800 bg-black/35 px-4 py-4 text-left hover:border-sky-500/50 transition-all">
                                                <div className="flex items-center justify-between gap-4">
                                                    <span className="text-sm font-bold text-white">{scene.name}</span>
                                                    <span className="text-[10px] font-mono uppercase tracking-[0.22em] text-sky-300">{scene.tempo} BPM</span>
                                                </div>
                                                <p className="mt-2 text-[10px] font-mono uppercase tracking-[0.18em] text-slate-500">{scene.mood} / {scene.vocalStyle} / {scene.duet ? 'Duet' : 'Solo'}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="rounded-[2rem] border border-slate-800 bg-slate-950/70 p-5 space-y-4">
                                    <div className="flex items-center justify-between gap-4 flex-wrap">
                                        <div>
                                            <p className="text-[10px] font-mono uppercase tracking-[0.36em] text-slate-500">Lyric forge</p>
                                            <p className="text-sm text-slate-300 mt-2">Rewrite the sung hooks for the active genre and section.</p>
                                        </div>
                                        <div className="flex items-center gap-2 flex-wrap">
                                            {['Verse', 'Lift', 'Chorus'].map((sectionName) => (
                                                <button
                                                    key={sectionName}
                                                    onClick={() => setLyricSection(sectionName)}
                                                    className={`px-3 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.24em] border transition-all ${lyricSection === sectionName ? 'bg-sky-500/20 text-sky-200 border-sky-400/50' : 'bg-slate-900 text-slate-400 border-slate-700'}`}
                                                >
                                                    {sectionName}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <textarea
                                        value={lyricDraft}
                                        onChange={(event) => setLyricDraft(event.target.value)}
                                        className="w-full min-h-[8.5rem] rounded-[1.4rem] border border-slate-800 bg-black/55 px-4 py-3 text-sm text-slate-200 outline-none focus:border-sky-500/60 resize-y"
                                        placeholder="One hook per line"
                                    />
                                    <p className="text-[10px] font-mono uppercase tracking-[0.18em] text-slate-500">One phrase per line. Words are split into syllable-like chunks by spaces.</p>
                                    <div className="flex items-center gap-3">
                                        <button onClick={saveLyricDraft} className="flex-1 py-3 bg-sky-600 hover:bg-sky-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.32em] transition-all shadow-xl shadow-sky-900/30">
                                            Save Hooks
                                        </button>
                                        <button onClick={resetLyricDraft} className="px-5 py-3 bg-slate-900 hover:bg-slate-800 rounded-2xl font-black text-[10px] uppercase tracking-[0.24em] border border-slate-700 text-slate-300 transition-all">
                                            Reset
                                        </button>
                                    </div>
                                </div>

                                <div className="rounded-[2rem] border border-slate-800 bg-slate-950/70 p-5 space-y-4">
                                    <div className="flex items-center justify-between gap-4">
                                        <div>
                                            <p className="text-[10px] font-mono uppercase tracking-[0.36em] text-slate-500">Recording deck</p>
                                            <p className="text-sm text-slate-300 mt-2">Capture the master bus, preview the take, then download the rendered artifact.</p>
                                        </div>
                                        <div className={`px-3 py-2 rounded-full text-[10px] uppercase tracking-[0.24em] font-mono ${isRecording ? 'bg-red-500/15 text-red-300 border border-red-400/40' : 'bg-slate-900 text-slate-400 border border-slate-700'}`}>
                                            {isRecording ? formatSeconds(recordingSeconds) : recordedUrl ? 'Ready' : 'Idle'}
                                        </div>
                                    </div>

                                    {!isRecording && (
                                        <button disabled={!isPlaying} onClick={startRecording} className="w-full py-4 bg-sky-600 hover:bg-sky-500 disabled:opacity-25 rounded-2xl font-black text-[10px] uppercase tracking-[0.32em] transition-all shadow-xl shadow-sky-900/30">
                                            Capture Performance
                                        </button>
                                    )}

                                    {isRecording && (
                                        <button onClick={stopRecording} className="w-full py-4 bg-red-600 hover:bg-red-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.32em] animate-pulse transition-colors">
                                            Finalize Take
                                        </button>
                                    )}

                                    {recordedUrl && (
                                        <div className="space-y-3">
                                            <audio controls src={recordedUrl} className="w-full" />
                                            <a href={recordedUrl} download={recordedFileName} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.32em] block text-center shadow-xl shadow-emerald-900/30">
                                                Download Artifact
                                            </a>
                                            <button onClick={resetRecording} className="w-full text-[10px] text-slate-500 uppercase font-black tracking-[0.24em] hover:text-slate-300 transition-colors">
                                                Reset Buffer
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="glass-panel rounded-3xl p-6 text-center">
                                <p className="text-[10px] text-slate-400 font-mono italic leading-relaxed uppercase tracking-[0.22em]">
                                    "The groove stops sounding procedural the moment timing, space, and feedback agree on a point of view."
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
